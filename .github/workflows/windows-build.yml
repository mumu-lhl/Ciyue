name: Windows Build

on:
  workflow_call:
    inputs:
      flutter_version:
        required: true
        type: string
      workflow_profile:
        required: false
        type: string
        default: "ci"
      artifact_name:
        required: false
        type: string
        default: "Windows"
      enable_build_cache:
        required: false
        type: boolean
        default: false
      include_metadata_defines:
        required: false
        type: boolean
        default: false
      include_dev_define:
        required: false
        type: boolean
        default: false
      package_release_artifacts:
        required: false
        type: boolean
        default: false
      msix_skip_clean:
        required: false
        type: boolean
        default: false

jobs:
  build-windows:
    name: Build Windows (${{ inputs.workflow_profile }})
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Cache Flutter Build
        if: ${{ inputs.enable_build_cache }}
        uses: actions/cache@v5
        with:
          path: |
            .dart_tool
            build
          key: ${{ runner.os }}-build-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Clean stale Windows CMake cache
        shell: pwsh
        run: |
          # The restored build cache may contain a CMake generator from an older
          # GitHub runner image (for example VS 2022). windows-latest is moving
          # to windows-2025-vs2026, whose generator is VS 2026, and CMake refuses
          # to reuse a build directory created by a different generator.
          Remove-Item -Recurse -Force build/windows -ErrorAction SilentlyContinue

      - name: Build Windows
        shell: pwsh
        run: |
          $extraArgs = @()
          if ("${{ inputs.include_dev_define }}" -eq "true") {
            $extraArgs += "--dart-define=DEV=true"
          }
          if ("${{ inputs.include_metadata_defines }}" -eq "true") {
            $hash = git rev-parse --short HEAD
            $timestamp = [int64](((Get-Date).ToUniversalTime()) - (Get-Date "1970-01-01")).TotalSeconds
            $extraArgs += "--dart-define=GIT_COMMIT_HASH=$hash"
            $extraArgs += "--dart-define=BUILD_TIMESTAMP=$timestamp"
          }

          # VS 2026 / MSVC 14.51 turns use of <experimental/coroutine> into
          # STL1011 static assertion failures. Some transitive Flutter Windows
          # plugins still include those headers, so suppress the compatibility
          # warning globally until the upstream plugins move to C++20 <coroutine>.
          $env:CL = "/D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS $env:CL"

          flutter build windows @extraArgs

      - name: Copy DLLs
        shell: pwsh
        run: |
          # Do not hard-code the Visual Studio year or MSVC redist version.
          # windows-latest is moving to windows-2025-vs2026, and that image may
          # omit the older VS2022 redist directory that this workflow used to copy
          # from. Prefer redist CRT directories when present, but fall back to the
          # runner's installed x64 CRT DLLs so CI artifacts can still be uploaded.
          $releaseDir = "build/windows/x64/runner/Release"
          $dllNames = @("vcruntime140.dll", "vcruntime140_1.dll", "msvcp140.dll")

          $visualStudioRoots = @()
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio/Installer/vswhere.exe"
          if (Test-Path $vswhere) {
            $visualStudioRoots += & $vswhere -all -products * -property installationPath
          }
          $visualStudioRoots += @(
            "C:\Program Files\Microsoft Visual Studio\2026\Enterprise",
            "C:\Program Files\Microsoft Visual Studio\2026\BuildTools",
            "C:\Program Files\Microsoft Visual Studio\2022\Enterprise",
            "C:\Program Files\Microsoft Visual Studio\2022\BuildTools"
          )

          $candidateDirs = @()
          foreach ($vsRoot in ($visualStudioRoots | Where-Object { $_ } | Select-Object -Unique)) {
            $redistRoot = Join-Path $vsRoot "VC/Redist/MSVC"
            if (Test-Path $redistRoot) {
              $candidateDirs += Get-ChildItem $redistRoot -Directory |
                Sort-Object Name -Descending |
                ForEach-Object { Get-ChildItem (Join-Path $_.FullName "x64") -Directory -Filter "Microsoft.VC*.CRT" -ErrorAction SilentlyContinue }
            }
          }
          $candidateDirs += Join-Path $env:SystemRoot "System32"

          foreach ($dll in $dllNames) {
            $source = $null
            foreach ($dir in $candidateDirs) {
              $path = Join-Path $dir $dll
              if (Test-Path $path) {
                $source = $path
                break
              }
            }
            if (-not $source) {
              $source = Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio",(Join-Path $env:SystemRoot "System32") -Filter $dll -Recurse -ErrorAction SilentlyContinue |
                Select-Object -First 1 -ExpandProperty FullName
            }
            if (-not $source) {
              throw "Missing required MSVC CRT DLL: $dll"
            }
            Write-Host "Copying $dll from $source"
            Copy-Item $source $releaseDir
          }

      - name: Upload runtime bundle
        if: ${{ !inputs.package_release_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: build/windows/x64/runner/Release/

      - name: Install Inno Setup
        if: ${{ inputs.package_release_artifacts }}
        run: choco install innosetup -y

      - name: Compression
        if: ${{ inputs.package_release_artifacts }}
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath ciyue-windows.zip

      - name: Build exe
        if: ${{ inputs.package_release_artifacts }}
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" inno_setup.iss

      - name: Upload release artifacts
        if: ${{ inputs.package_release_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: |
            ciyue-installer.exe
            ciyue-windows.zip
