name: Linux Build

on:
  workflow_call:
    inputs:
      flutter_version:
        required: true
        type: string
      workflow_profile:
        required: false
        type: string
        default: "ci"
      artifact_name:
        required: false
        type: string
        default: "Linux"
      include_metadata_defines:
        required: false
        type: boolean
        default: false
      include_dev_define:
        required: false
        type: boolean
        default: false
      package_release_artifacts:
        required: false
        type: boolean
        default: false
      extra_build_args:
        required: false
        type: string
        default: ""

jobs:
  build-linux:
    name: Build Linux (${{ inputs.workflow_profile }})
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    env:
      # Pin Arch Linux packages to a pre-GLIBC_2.42 snapshot so release
      # artifacts keep using Arch's WPEWebKit stack while remaining usable on
      # older distributions such as Ubuntu 24.04 / KDE neon.
      ARCHLINUX_ARCHIVE_DATE: 2024/07/01
    steps:
      - uses: actions/checkout@v6

      - name: Install pre dependencies
        run: |
          printf 'Server = https://archive.archlinux.org/repos/%s/$repo/os/$arch\n' "$ARCHLINUX_ARCHIVE_DATE" > /etc/pacman.d/mirrorlist
          # The current archlinux:base-devel image has a newer keyring than the
          # archive snapshot. Signature verification fails for some historical
          # packages with disabled/expired keys, so disable package signatures
          # only for this disposable CI container before downgrading.
          sed -i \
            -e 's/^SigLevel[[:space:]]*=.*/SigLevel = Never/' \
            -e 's/^LocalFileSigLevel[[:space:]]*=.*/LocalFileSigLevel = Never/' \
            /etc/pacman.conf
          pacman -Syyuu --noconfirm --disable-download-timeout --overwrite '*'
          pacman -S --noconfirm --disable-download-timeout --overwrite '*' jq git clang cmake ninja wget patchelf
          git config --global --add safe.directory '*'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          cache: true

      - name: Install dependencies
        run: |
          pacman -S --noconfirm gtk3 gstreamer libayatana-appindicator libkeybinder3 wpewebkit
          flutter pub get

      - name: Build Linux
        shell: bash
        run: |
          BUILD_ARGS="${{ inputs.extra_build_args }}"
          if [[ "${{ inputs.include_dev_define }}" == "true" ]]; then
            BUILD_ARGS="$BUILD_ARGS --dart-define=DEV=true"
          fi
          if [[ "${{ inputs.include_metadata_defines }}" == "true" ]]; then
            BUILD_ARGS="$BUILD_ARGS --dart-define=GIT_COMMIT_HASH=$(git rev-parse --short HEAD) --dart-define=BUILD_TIMESTAMP=$(date +%s)"
          fi
          flutter build linux $BUILD_ARGS

      - name: Create WPE symlinks
        run: |
          cd build/linux/x64/release/bundle/lib/
          for soname in libwpe-1.0.so.1 libWPEWebKit-2.0.so.1; do
            if [[ -e "$soname" ]]; then
              continue
            fi
            target=$(find . -maxdepth 1 -type f -name "$soname.*" -printf '%f\n' | sort -V | tail -n 1)
            if [[ -z "$target" ]]; then
              echo "Missing $soname.* in bundled libraries" >&2
              exit 1
            fi
            ln -s "$target" "$soname"
          done

      - name: Bundle Libraries
        run: |
          BUNDLE_LIB_DIR="build/linux/x64/release/bundle/lib"

          for lib in libicui18n.so libicuuc.so libjpeg.so libxml2.so libicudata.so; do
            src=$(find /usr/lib -maxdepth 1 -type f -name "$lib.*" -printf '%p\n' | sort -V | tail -n 1)
            if [[ -z "$src" ]]; then
              echo "Missing $lib in /usr/lib" >&2
              exit 1
            fi
            cp -L "$src" "$BUNDLE_LIB_DIR/"
          done

          cd build/linux/x64/release/bundle
          patchelf --force-rpath --set-rpath '$ORIGIN/lib' ciyue

      - name: Compression
        if: ${{ inputs.package_release_artifacts }}
        run: tar -cJvf ciyue-linux.tar.xz build/linux/x64/release/bundle/*

      - name: Build AppImage
        if: ${{ inputs.package_release_artifacts }}
        run: |
          wget -O appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          mv appimagetool /usr/local/bin/

          ./tools/build_appimage.sh
          mv Ciyue-x86_64.AppImage Ciyue-latest-x86_64.AppImage
          mv Ciyue-x86_64.AppImage.zsync Ciyue-latest-x86_64.AppImage.zsync

      - name: Build Deb
        if: ${{ inputs.package_release_artifacts }}
        run: |
          pacman -S --noconfirm dpkg

          ./tools/build_deb.sh
          mv *.deb ciyue-x86_64.deb

      - name: Build rpm
        if: ${{ inputs.package_release_artifacts }}
        run: |
          pacman -S --noconfirm rpm-tools

          ./tools/build_rpm.sh
          mv ciyue-*.x86_64.rpm ciyue.x86_64.rpm

      - name: Upload bundle
        if: ${{ !inputs.package_release_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: build/linux/x64/release/bundle/

      - name: Upload release artifacts
        if: ${{ inputs.package_release_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: |
            ciyue-linux.tar.xz
            Ciyue-latest-x86_64.AppImage
            *.zsync
            ciyue-x86_64.deb
            ciyue-x86_64.rpm
